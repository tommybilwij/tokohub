name: Build Desktop App

on:
  push:
    branches: [feature/tauri, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            label: macOS
          - os: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            label: Windows

    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build PyInstaller sidecar
        run: |
          uv run --group dev pyinstaller pyinstaller.spec --noconfirm --clean
          mkdir -p src-tauri/binaries

      - name: Copy sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          cp dist/tokohub-server/tokohub-server src-tauri/binaries/tokohub-server
          cp -r dist/tokohub-server/_internal src-tauri/binaries/_internal

      - name: Copy sidecar (Windows)
        if: runner.os == 'Windows'
        run: |
          copy dist\tokohub-server\tokohub-server.exe src-tauri\binaries\tokohub-server.exe
          xcopy dist\tokohub-server\_internal src-tauri\binaries\_internal /E /I /Y
        shell: cmd

      - name: Build Tauri app (macOS universal)
        if: runner.os == 'macOS'
        run: cargo tauri build --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Fix macOS bundle
        if: runner.os == 'macOS'
        run: |
          APP=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP" ]; then echo "No .app bundle found"; exit 1; fi
          INTERNAL_SRC="$APP/Contents/Resources/binaries/_internal"
          RESOURCES_DIR="$APP/Contents/Resources"
          FRAMEWORKS_DIR="$APP/Contents/Frameworks"
          cp -Rn "$INTERNAL_SRC"/* "$RESOURCES_DIR/" 2>/dev/null || true
          mkdir -p "$FRAMEWORKS_DIR"
          for dylib in "$INTERNAL_SRC"/libpython*.dylib; do
            [ -f "$dylib" ] || continue
            fname=$(basename "$dylib")
            if [ ! -e "$FRAMEWORKS_DIR/$fname" ]; then
              cp "$dylib" "$FRAMEWORKS_DIR/$fname"
            fi
          done
          echo "macOS bundle fixed"

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: tokohub-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tokohub-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
