# Default application settings
# Override with environment variables or .env file

db:
  host: 192.168.5.25
  port: 3306
  user: root
  password: ""
  name: myposse
  charset: latin1
  pool_size: 5

# Azure OpenAI
openai:
  api_base: ""
  api_key: ""
  deployment_id: gpt-4o-standard
  api_version: "2024-08-01-preview"

# Fuzzy matching
fuzzy_cache_ttl: 300   # seconds
fuzzy_top_n: 5
fuzzy_min_score: 40

# Server
server_port: 5000
server_host: "127.0.0.1"

# LAN mode (allow other devices on the same WiFi)
lan_mode: false
