<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Stock Entry{% endblock %} - TOKO SEGAR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">
        <i class="bi bi-shop"></i> TOKO SEGAR
      </a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/' or request.path.startswith('/receipt') %}active{% endif %}"
               href="/">
              <i class="bi bi-receipt"></i> Entry Barang
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/aliases' %}active{% endif %}"
               href="/aliases">
              <i class="bi bi-link-45deg"></i> Alias
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/history' %}active{% endif %}"
               href="/history">
              <i class="bi bi-clock-history"></i> Riwayat PO
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-3">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
