<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if store_name %}{{ store_name }}{% else %}TokoHub{% endif %} - {% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}?v={{ range(10000,99999) | random }}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark navbar-app">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">
        <i class="bi bi-shop"></i> {% if store_name %}{{ store_name | upper }}{% else %}TOKOHUB{% endif %}
      </a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link {% if request.url.path == '/scanner' %}active{% endif %}"
               href="/scanner">
              <i class="bi bi-upc-scan"></i> Scanner
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.url.path == '/entry' %}active{% endif %}"
               href="/entry">
              <i class="bi bi-receipt"></i> Input Faktur
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.url.path == '/history' %}active{% endif %}"
               href="/history">
              <i class="bi bi-clock-history"></i> Daftar Faktur
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.url.path == '/sales-history' %}active{% endif %}"
               href="/sales-history">
              <i class="bi bi-graph-up"></i> Penjualan
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.url.path == '/foc-history' %}active{% endif %}"
               href="/foc-history">
              <i class="bi bi-gift"></i> Barang Diskon
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.url.path == '/settings' %}active{% endif %}"
               href="/settings">
              <i class="bi bi-gear"></i> Settings
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-3">
    {% block content %}{% endblock %}
  </main>

  <!-- Toast container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <script>
  // Zoom support for Tauri WebView (Cmd/Ctrl + Plus/Minus/0)
  (function(){
    var z = parseFloat(localStorage.getItem('_zoom') || '1');
    document.documentElement.style.zoom = z;
    document.addEventListener('keydown', function(e){
      if (!(e.metaKey || e.ctrlKey)) return;
      if (e.key === '=' || e.key === '+') { e.preventDefault(); z = Math.min(z + 0.1, 2); }
      else if (e.key === '-') { e.preventDefault(); z = Math.max(z - 0.1, 0.5); }
      else if (e.key === '0') { e.preventDefault(); z = 1; }
      else return;
      document.documentElement.style.zoom = z;
      localStorage.setItem('_zoom', z.toFixed(1));
    });
  })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}?v={{ range(10000,99999) | random }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
