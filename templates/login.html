<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if store_name %}{{ store_name }}{% else %}TokoHub{% endif %} - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}?v={{ range(10000,99999) | random }}" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; }
    .login-card { max-width: 400px; margin: 0 auto; margin-top: 12vh; }
    .login-card .card { border: none; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .login-brand { color: #fff; text-align: center; margin-bottom: 2rem; }
    .login-brand i { font-size: 2.5rem; }
    .login-brand h2 { margin-top: 0.5rem; font-weight: 700; }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-card">
      <div class="login-brand">
        <i class="bi bi-shop"></i>
        <h2>{% if store_name %}{{ store_name | upper }}{% else %}TOKOHUB{% endif %}</h2>
      </div>
      <div class="card">
        <div class="card-body p-4">
          <h5 class="card-title text-center mb-4">Login</h5>
          <div id="loginAlert" class="alert alert-danger d-none"></div>
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label" for="username">Username</label>
              <select class="form-select" id="username" required>
                <option value="">Pilih user...</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label" for="password">Password</label>
              <input type="password" class="form-control" id="password" required
                     placeholder="Masukkan password" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary w-100" id="btnLogin">
              <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function() {
    const usernameSelect = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginForm = document.getElementById('loginForm');
    const loginAlert = document.getElementById('loginAlert');
    const btnLogin = document.getElementById('btnLogin');

    // Load user list for username dropdown
    fetch('/api/auth/user-list')
      .then(r => r.json())
      .then(list => {
        list.forEach(u => {
          const opt = document.createElement('option');
          opt.value = u.nouser;
          opt.textContent = u.usrname + ' (' + u.nouser + ')';
          usernameSelect.appendChild(opt);
        });
      })
      .catch(() => {
        // Fallback: allow manual entry
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'form-control';
        input.id = 'username';
        input.placeholder = 'Username';
        input.required = true;
        usernameSelect.replaceWith(input);
      });

    function showError(msg) {
      loginAlert.textContent = msg;
      loginAlert.classList.remove('d-none');
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginAlert.classList.add('d-none');
      btnLogin.disabled = true;

      const username = document.getElementById('username').value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        showError('Username dan password harus diisi');
        btnLogin.disabled = false;
        return;
      }

      try {
        let resp = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username, password}),
        });
        let data = await resp.json();

        if (resp.ok) {
          window.location.href = '/';
          return;
        }

        // User not registered — try auto-register (works for first user)
        if (resp.status === 401 && data.error && data.error.includes('belum terdaftar')) {
          resp = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password}),
          });
          data = await resp.json();
          if (resp.ok) {
            // Now login with the new account
            resp = await fetch('/api/auth/login', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({username, password}),
            });
            if (resp.ok) {
              window.location.href = '/';
              return;
            }
          }
          showError(data.error || 'Registrasi gagal');
        } else {
          showError(data.error || 'Login gagal');
        }
      } catch (err) {
        showError('Koneksi gagal');
      } finally {
        btnLogin.disabled = false;
      }
    });
  })();
  </script>
</body>
</html>
