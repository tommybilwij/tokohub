{% extends "base.html" %}
{% block title %}Laporan Perubahan Harga{% endblock %}

{% block content %}
<div class="sh-page">
  <h5 class="mb-3"><i class="bi bi-journal-text"></i> Laporan Perubahan Harga</h5>

  <!-- Filter Bar -->
  <div class="sh-filter-bar">
    <div class="sh-custom-range">
      <label class="sh-date-label">Tanggal
        <input type="date" id="reportDate" class="form-control form-control-sm">
      </label>
      <button class="btn btn-sm btn-primary" id="btnLoadReport">
        <i class="bi bi-search"></i> Cari
      </button>
    </div>
  </div>

  <!-- Riwayat Input Faktur -->
  <div class="px-3 pt-3 pb-1"><h6 class="text-muted mb-0"><i class="bi bi-receipt"></i> Riwayat Input Faktur</h6></div>
  <div class="table-responsive">
    <table class="table table-sm table-hover mb-0 pc-report-table">
      <colgroup>
        <col style="width:15%"><col style="width:5%"><col style="width:14%"><col><col style="width:12%">
      </colgroup>
      <thead class="table-light">
        <tr>
          <th>No. Faktur</th>
          <th>Dept</th>
          <th>Barcode</th>
          <th>Nama</th>
          <th class="text-end">HJual Baru</th>
        </tr>
      </thead>
      <tbody id="fakturBody"></tbody>
    </table>
  </div>

  <!-- Riwayat Perubahan Harga -->
  <div class="px-3 pt-3 pb-1 border-top"><h6 class="text-muted mb-0"><i class="bi bi-pencil-square"></i> Riwayat Perubahan Harga</h6></div>
  <div class="table-responsive">
    <table class="table table-sm table-hover mb-0 pc-report-table">
      <colgroup>
        <col style="width:15%"><col style="width:5%"><col style="width:14%"><col><col style="width:12%">
      </colgroup>
      <thead class="table-light">
        <tr>
          <th>No. PH</th>
          <th>Dept</th>
          <th>Barcode</th>
          <th>Nama</th>
          <th class="text-end">HJual Baru</th>
        </tr>
      </thead>
      <tbody id="manualBody"></tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  const dateInput = document.getElementById('reportDate');
  dateInput.value = new Date().toISOString().split('T')[0];

  function fmt(n) { return new Intl.NumberFormat('id-ID', {minimumFractionDigits:2, maximumFractionDigits:2}).format(n); }

  function loadReport() {
    const d = dateInput.value;
    fetch(`/api/price-change/report?report_date=${d}`)
      .then(r => r.json())
      .then(data => {
        // Faktur changes
        const fb = document.getElementById('fakturBody');
        fb.innerHTML = '';
        if (!data.from_faktur || data.from_faktur.length === 0) {
          fb.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">Tidak ada riwayat input faktur.</td></tr>';
        } else {
          data.from_faktur.forEach(r => {
            fb.innerHTML += `<tr>
              <td><code>${r.ref_number}</code></td>
              <td>${r.department || ''}</td>
              <td><code>${r.barcode || ''}</code></td>
              <td>${r.artname}</td>
              <td class="text-end fw-bold">${fmt(r.new_hjual)}</td>
            </tr>`;
          });
        }

        // Manual changes
        const mb = document.getElementById('manualBody');
        mb.innerHTML = '';
        if (!data.manual || data.manual.length === 0) {
          mb.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">Tidak ada riwayat perubahan harga.</td></tr>';
        } else {
          data.manual.forEach(r => {
            mb.innerHTML += `<tr>
              <td><code>${r.ph_number}</code></td>
              <td>${r.department || ''}</td>
              <td><code>${r.barcode || ''}</code></td>
              <td>${r.artname}</td>
              <td class="text-end fw-bold">${fmt(r.new_hjual)}</td>
            </tr>`;
          });
        }
      });
  }

  document.getElementById('btnLoadReport').addEventListener('click', loadReport);
  dateInput.addEventListener('change', loadReport);
  loadReport();
})();
</script>
{% endblock %}
