{% extends "base.html" %}
{% block title %}Laporan Perubahan Harga{% endblock %}

{% block content %}
<div class="sh-page">
  <div class="d-flex align-items-center gap-3 mb-3">
    <a href="/laporan" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i> Kembali</a>
    <h5 class="mb-0"><i class="bi bi-journal-text"></i> Laporan Perubahan Harga</h5>
  </div>

  <!-- Filter Bar -->
  <div class="sh-filter-bar">
    <div class="sh-custom-range">
      <label class="sh-date-label">Tanggal
        <input type="date" id="reportDate" class="form-control form-control-sm">
      </label>
      <button class="btn btn-sm btn-primary" id="btnLoadReport">
        <i class="bi bi-search"></i> Cari
      </button>
    </div>
  </div>

  <div class="d-flex justify-content-end align-items-center mb-2 d-none" id="pcExportBtns">
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline-success" id="pcBtnCsv">
        <i class="bi bi-filetype-csv"></i> CSV
      </button>
      <button class="btn btn-sm btn-outline-danger" id="pcBtnPdf">
        <i class="bi bi-filetype-pdf"></i> PDF
      </button>
    </div>
  </div>

  <div class="table-responsive mt-3">
    <table class="sh-table" id="combinedTable">
      <thead>
        <tr>
          <th class="sh-sortable" style="width:9%" data-sort="source" data-table="combined">Sumber <i class="bi bi-chevron-expand"></i></th>
          <th class="sh-sortable" style="width:12%" data-sort="ref" data-table="combined">No. Ref <i class="bi bi-chevron-expand"></i></th>
          <th class="sh-sortable" style="width:5%" data-sort="dept" data-table="combined">Dept <i class="bi bi-chevron-expand"></i></th>
          <th class="sh-sortable" style="width:7%" data-sort="artno" data-table="combined">Artno <i class="bi bi-chevron-expand"></i></th>
          <th class="sh-sortable" style="width:11%" data-sort="barcode" data-table="combined">Barcode <i class="bi bi-chevron-expand"></i></th>
          <th class="sh-sortable" data-sort="name" data-table="combined">Nama <i class="bi bi-chevron-down"></i></th>
          <th class="sh-sortable text-end" style="width:10%" data-sort="old" data-table="combined">HJual Lama <i class="bi bi-chevron-expand"></i></th>
          <th class="sh-sortable text-end" style="width:10%" data-sort="new" data-table="combined">HJual Baru <i class="bi bi-chevron-expand"></i></th>
        </tr>
      </thead>
      <tbody id="combinedBody"></tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='vendor/jspdf.umd.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/jspdf.plugin.autotable.min.js') }}"></script>
<script>
(function() {
  var dateInput = document.getElementById('reportDate');
  var elExportBtns = document.getElementById('pcExportBtns');
  var elBtnCsv = document.getElementById('pcBtnCsv');
  var elBtnPdf = document.getElementById('pcBtnPdf');
  var _d = new Date(); dateInput.value = _d.getFullYear() + '-' + String(_d.getMonth()+1).padStart(2,'0') + '-' + String(_d.getDate()).padStart(2,'0');

  var lastData = null;

  function fmt(n) { return new Intl.NumberFormat('id-ID', {minimumFractionDigits:2, maximumFractionDigits:2}).format(n); }

  function esc(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // Combined data and sort state
  var combinedRows = [];
  var sortState = { key: 'name', asc: true };

  function getSortValue(row, key) {
    switch(key) {
      case 'source': return row._source || '';
      case 'ref': return row._ref || '';
      case 'dept': return row.department || '';
      case 'artno': return row.artno || '';
      case 'barcode': return row.barcode || '';
      case 'name': return row.artname || '';
      case 'old': return Number(row.old_hjual) || 0;
      case 'new': return Number(row.new_hjual) || 0;
      default: return '';
    }
  }

  function sortRows(rows, key, asc) {
    return rows.slice().sort(function(a, b) {
      var va = getSortValue(a, key);
      var vb = getSortValue(b, key);
      if (typeof va === 'number') return asc ? va - vb : vb - va;
      va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
      if (va < vb) return asc ? -1 : 1;
      if (va > vb) return asc ? 1 : -1;
      return 0;
    });
  }

  function renderCombined(rows) {
    var tb = document.getElementById('combinedBody');
    tb.innerHTML = '';
    if (!rows || !rows.length) {
      tb.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-3">Tidak ada riwayat perubahan harga.</td></tr>';
      return;
    }
    rows.forEach(function(r) {
      var srcBadge = r._source === 'Faktur'
        ? '<span class="badge bg-info text-dark">Faktur Pembelian</span>'
        : '<span class="badge bg-warning text-dark">Perubahan Harga</span>';
      tb.innerHTML += '<tr>'
        + '<td>' + srcBadge + '</td>'
        + '<td><code>' + esc(r._ref) + '</code></td>'
        + '<td>' + esc(r.department || '') + '</td>'
        + '<td><code>' + esc(r.artno || '') + '</code></td>'
        + '<td><code>' + esc(r.barcode || '') + '</code></td>'
        + '<td>' + esc(r.artname) + '</td>'
        + '<td class="text-end">' + fmt(r.old_hjual) + '</td>'
        + '<td class="text-end fw-bold">' + fmt(r.new_hjual) + '</td>'
        + '</tr>';
    });
  }

  function updateSortIcons(activeKey, asc) {
    document.querySelectorAll('#combinedTable th[data-sort]').forEach(function(th) {
      var icon = th.querySelector('i');
      if (th.dataset.sort === activeKey) {
        icon.className = asc ? 'bi bi-chevron-up' : 'bi bi-chevron-down';
      } else {
        icon.className = 'bi bi-chevron-expand';
      }
    });
  }

  // Attach sort click handlers
  document.querySelectorAll('#combinedTable th[data-sort]').forEach(function(th) {
    th.addEventListener('click', function() {
      var key = th.dataset.sort;
      if (sortState.key === key) { sortState.asc = !sortState.asc; }
      else { sortState.key = key; sortState.asc = true; }
      var sorted = sortRows(combinedRows, key, sortState.asc);
      renderCombined(sorted);
      updateSortIcons(key, sortState.asc);
    });
  });

  function loadReport() {
    var d = dateInput.value;
    fetch('/api/price-change/report?report_date=' + d)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        lastData = data;

        // Build combined rows
        combinedRows = [];
        (data.from_faktur || []).forEach(function(r) {
          r._source = 'Faktur';
          r._ref = r.ref_number || '';
          combinedRows.push(r);
        });
        (data.manual || []).forEach(function(r) {
          r._source = 'PH';
          r._ref = r.ph_number || '';
          combinedRows.push(r);
        });

        if (combinedRows.length) {
          elExportBtns.classList.remove('d-none');
        } else {
          elExportBtns.classList.add('d-none');
        }

        // Default sort by Nama ascending
        sortState = { key: 'name', asc: true };
        var sorted = sortRows(combinedRows, 'name', true);
        renderCombined(sorted);
        updateSortIcons('name', true);
      });
  }

  // Get currently displayed rows (respects current sort order)
  function getExportRows() {
    if (!combinedRows.length) return [];
    return sortRows(combinedRows, sortState.key, sortState.asc);
  }

  // CSV Export
  elBtnCsv.addEventListener('click', function() {
    var all = getExportRows();
    if (!all.length) return;

    var srcLabel = function(r) { return r._source === 'Faktur' ? 'Faktur Pembelian' : 'Perubahan Harga'; };
    var csvRows = [['#', 'Sumber', 'No. Ref', 'Dept', 'Artno', 'Barcode', 'Nama', 'HJual Lama', 'HJual Baru']];
    all.forEach(function(r, i) {
      csvRows.push([i + 1, srcLabel(r), r._ref, r.department || '', '\t' + (r.artno || ''), '\t' + (r.barcode || ''), r.artname || '', Number(r.old_hjual).toFixed(2), Number(r.new_hjual).toFixed(2)]);
    });

    var csv = csvRows.map(function(row) {
      return row.map(function(cell) {
        var s = String(cell);
        if (s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1) {
          return '"' + s.replace(/"/g, '""') + '"';
        }
        return s;
      }).join(',');
    }).join('\n');

    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'perubahan_harga_' + dateInput.value + '.csv';
    link.click();
    URL.revokeObjectURL(link.href);
  });

  // PDF Export
  elBtnPdf.addEventListener('click', function() {
    var all = getExportRows();
    if (!all.length) return;

    var srcLabel = function(r) { return r._source === 'Faktur' ? 'Faktur Pembelian' : 'Perubahan Harga'; };
    var jsPDF = window.jspdf.jsPDF;
    var doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

    doc.setFontSize(14);
    doc.text('Laporan Perubahan Harga', 14, 15);
    doc.setFontSize(9);
    doc.text('Tanggal: ' + dateInput.value, 14, 21);

    var tableRows = all.map(function(r, i) {
      return [i + 1, srcLabel(r), r._ref, r.department || '', r.artno || '', r.barcode || '', r.artname || '', fmt(r.old_hjual), fmt(r.new_hjual)];
    });

    doc.autoTable({
      startY: 25,
      head: [['#', 'Sumber', 'No. Ref', 'Dept', 'Artno', 'Barcode', 'Nama', 'HJual Lama', 'HJual Baru']],
      body: tableRows,
      styles: { fontSize: 8, cellPadding: 1.5 },
      headStyles: { fillColor: [255, 193, 7] , textColor: [0, 0, 0] },
      columnStyles: {
        0: { halign: 'center', cellWidth: 8 },
        7: { halign: 'right' },
        8: { halign: 'right' },
      },
    });

    doc.save('perubahan_harga_' + dateInput.value + '.pdf');
  });

  document.getElementById('btnLoadReport').addEventListener('click', loadReport);
  dateInput.addEventListener('change', loadReport);
  loadReport();
})();
</script>
{% endblock %}
