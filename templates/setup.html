<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TokoHub - Setup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}?v={{ range(10000,99999) | random }}" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-7">

        <div class="text-center mb-4">
          <h3><i class="bi bi-shop"></i> TokoHub Setup</h3>
          <p class="text-muted">Periksa pengaturan sebelum memulai.</p>
        </div>

        <form id="setupForm">

          <!-- Toko -->
          <div class="card mb-3">
            <div class="card-body">
              <h5 class="card-title"><i class="bi bi-shop-window"></i> Toko</h5>
              <div class="row g-2">
                <div class="col-12">
                  <label class="form-label">Nama Toko</label>
                  <input type="text" class="form-control form-control-sm" name="store_name" placeholder="Toko Segar">
                </div>
              </div>
            </div>
          </div>

          <!-- Database -->
          <div class="card mb-3">
            <div class="card-body">
              <h5 class="card-title"><i class="bi bi-database"></i> Database</h5>
              <div class="row g-2">
                <div class="col-md-8">
                  <label class="form-label">Host</label>
                  <input type="text" class="form-control form-control-sm" name="db.host">
                </div>
                <div class="col-md-4">
                  <label class="form-label">Port</label>
                  <input type="number" class="form-control form-control-sm" name="db.port">
                </div>
                <div class="col-md-4">
                  <label class="form-label">User</label>
                  <input type="text" class="form-control form-control-sm" name="db.user">
                </div>
                <div class="col-md-4">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control form-control-sm" name="db.password" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;">
                </div>
                <div class="col-md-4">
                  <label class="form-label">Database</label>
                  <input type="text" class="form-control form-control-sm" name="db.name">
                </div>
              </div>
            </div>
          </div>

          <!-- Server -->
          <div class="card mb-3">
            <div class="card-body">
              <h5 class="card-title"><i class="bi bi-hdd-network"></i> Server</h5>
              <div class="row g-2">
                <div class="col-md-4">
                  <label class="form-label">Host</label>
                  <input type="text" class="form-control form-control-sm" name="server_host">
                </div>
                <div class="col-md-4">
                  <label class="form-label">Port</label>
                  <input type="number" class="form-control form-control-sm" name="server_port" min="1" max="65535">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="lanModeCheck" name="lan_mode">
                    <label class="form-check-label" for="lanModeCheck">LAN Mode</label>
                  </div>
                </div>
                <div class="col-md-4" id="mdnsHostnameGroup" style="display:none;">
                  <label class="form-label">Hostname mDNS</label>
                  <div class="input-group input-group-sm">
                    <input type="text" class="form-control form-control-sm" name="mdns_hostname" placeholder="tokohub">
                    <span class="input-group-text">.local</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Azure OpenAI -->
          <div class="card mb-3">
            <div class="card-body">
              <h5 class="card-title"><i class="bi bi-robot"></i> Azure OpenAI</h5>
              <div class="row g-2">
                <div class="col-12">
                  <label class="form-label">API Base URL</label>
                  <input type="text" class="form-control form-control-sm" name="openai.api_base">
                </div>
                <div class="col-md-6">
                  <label class="form-label">API Key</label>
                  <input type="password" class="form-control form-control-sm" name="openai.api_key" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Deployment ID</label>
                  <input type="text" class="form-control form-control-sm" name="openai.deployment_id">
                </div>
                <div class="col-md-6">
                  <label class="form-label">API Version</label>
                  <input type="text" class="form-control form-control-sm" name="openai.api_version">
                </div>
              </div>
            </div>
          </div>

          <!-- Fuzzy Matching -->
          <div class="card mb-3">
            <div class="card-body">
              <h5 class="card-title"><i class="bi bi-search"></i> Fuzzy Matching</h5>
              <div class="row g-2">
                <div class="col-md-4">
                  <label class="form-label">Cache TTL (detik)</label>
                  <input type="number" class="form-control form-control-sm" name="fuzzy_cache_ttl" min="0">
                </div>
                <div class="col-md-4">
                  <label class="form-label">Top N</label>
                  <input type="number" class="form-control form-control-sm" name="fuzzy_top_n" min="1" max="50">
                </div>
                <div class="col-md-4">
                  <label class="form-label">Min Score</label>
                  <input type="number" class="form-control form-control-sm" name="fuzzy_min_score" min="0" max="100">
                </div>
              </div>
            </div>
          </div>

          <!-- Submit -->
          <div class="d-grid mb-4">
            <button type="submit" class="btn btn-warning btn-lg fw-bold" id="btnMulai">
              <i class="bi bi-play-fill"></i> Mulai
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  (function() {
    // Load current settings and populate form
    fetch('/api/settings')
      .then(r => r.json())
      .then(cfg => {
        setVal('db.host', cfg.db.host);
        setVal('db.port', cfg.db.port);
        setVal('db.user', cfg.db.user);
        setVal('db.name', cfg.db.name);
        // password left empty (masked on server)

        setVal('store_name', cfg.store_name);

        setVal('server_host', cfg.server_host);
        setVal('server_port', cfg.server_port);
        document.getElementById('lanModeCheck').checked = cfg.lan_mode;
        setVal('mdns_hostname', cfg.mdns_hostname);
        toggleMdns(cfg.lan_mode);

        setVal('openai.api_base', cfg.openai.api_base);
        setVal('openai.deployment_id', cfg.openai.deployment_id);
        setVal('openai.api_version', cfg.openai.api_version);

        setVal('fuzzy_cache_ttl', cfg.fuzzy_cache_ttl);
        setVal('fuzzy_top_n', cfg.fuzzy_top_n);
        setVal('fuzzy_min_score', cfg.fuzzy_min_score);
      });

    function setVal(name, value) {
      const el = document.querySelector('#setupForm [name="' + name + '"]');
      if (el) el.value = value;
    }

    // Toggle mDNS field
    function toggleMdns(checked) {
      document.getElementById('mdnsHostnameGroup').style.display = checked ? '' : 'none';
    }
    document.getElementById('lanModeCheck').addEventListener('change', function() {
      toggleMdns(this.checked);
    });

    // Collect form into nested object
    function collectForm(form) {
      const data = {};
      form.querySelectorAll('input').forEach(input => {
        const name = input.name;
        if (!name) return;

        let val;
        if (input.type === 'checkbox') {
          val = input.checked;
        } else if (input.type === 'password') {
          if (!input.value) return;
          val = input.value;
        } else if (input.type === 'number') {
          val = input.value === '' ? '' : Number(input.value);
        } else {
          val = input.value;
        }

        const parts = name.split('.');
        if (parts.length === 2) {
          if (!data[parts[0]]) data[parts[0]] = {};
          data[parts[0]][parts[1]] = val;
        } else {
          data[name] = val;
        }
      });
      return data;
    }

    // Submit handler
    document.getElementById('setupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = document.getElementById('btnMulai');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Menyimpan...';

      const payload = collectForm(this);
      fetch('/api/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      })
        .then(r => r.json())
        .then(res => {
          if (res.ok) {
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Memulai ulang server...';
            // Trigger server restart, then poll until ready
            fetch('/api/restart', { method: 'POST' }).catch(() => {});
            setTimeout(function pollReady(attempts) {
              attempts = attempts || 0;
              fetch('/health').then(r => {
                if (r.ok) window.location.href = '/';
                else throw new Error();
              }).catch(() => {
                if (attempts < 30) {
                  setTimeout(() => pollReady(attempts + 1), 1000);
                } else {
                  btn.disabled = false;
                  btn.innerHTML = '<i class="bi bi-play-fill"></i> Mulai';
                  alert('Server tidak merespons. Coba refresh halaman.');
                }
              });
            }, 1500);
          } else {
            alert('Gagal menyimpan: ' + (res.error || 'Unknown error'));
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-play-fill"></i> Mulai';
          }
        })
        .catch(err => {
          alert('Error: ' + err.message);
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-play-fill"></i> Mulai';
        });
    });
  })();
  </script>
</body>
</html>
